<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vinerama - Stumble Guys</title>
    <style>
        /* Estilização Geral */
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f0f0f;
            color: #ffffff;
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        /* Seção de Apresentação */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(180deg, #1a1a1a 0%, #0f0f0f 100%);
        }

        .hero h1 {
            font-size: 4rem;
            margin-bottom: 10px;
            color: #ffcc00;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .hero p {
            font-size: 1.2rem;
            color: #aaaaaa;
            margin-bottom: 30px;
        }

        .scroll-indicator {
            margin-top: 50px;
            animation: bounce 2s infinite;
            color: #ffcc00;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        /* Seção de Download */
        .download-section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #0f0f0f;
            border-top: 2px solid #222;
        }

        .game-title {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .version-tag {
            background-color: #222;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 1rem;
            color: #00ff88;
            margin-bottom: 40px;
            border: 1px solid #333;
        }

        .btn-download {
            background-color: #007bff;
            color: white;
            padding: 18px 45px;
            font-size: 1.2rem;
            font-weight: bold;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.3);
        }

        .btn-download:hover {
            background-color: #0056b3;
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 123, 255, 0.5);
        }

        /* Animação do "Arraste para baixo" */
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-10px);}
            60% {transform: translateY(-5px);}
        }
    </style>
</head>
<body>

    <section class="hero">
        <h1>VINERAMA</h1>
        <p>O mestre das coroas no Stumble Guys!</p>
        
        <div class="scroll-indicator">
            Arraste para baixo<br>
            <span>▼</span>
        </div>
    </section>

    <section class="download-section">
        <div class="game-title">Stumble Guys</div>
        <div class="version-tag">Versão: 0.97</div>
        
        <a href="https://www.softonic.com.br/download/stumble-guys/android/post-download?dt=internalDownload" 
           class="btn-download" target="_blank">
            BAIXAR AGORA
        </a>
    </section>

</body>
</html>
